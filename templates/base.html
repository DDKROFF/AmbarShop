{% load static %}
<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Амбар — зоотовары и комбикорм{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Интернет-магазин зоотоваров, комбикорма и аксессуаров для животных.{% endblock %}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'style/style.css' %}" />
    <link rel="icon" type="image/svg+xml" href="{% static 'images/icons/Favicon.svg' %}" />
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    {% include "partials/header.html" %}

    <main>
      {% block content %}{% endblock %}
    </main>

    {% include "partials/footer.html" %}

    {% block modals %}{% endblock %}

    <script src="{% static 'js/layout.js' %}"></script>
    <script src="{% static 'js/main.js' %}"></script>
    <script src="{% static 'js/mobile-menu.js' %}"></script>
    {% block extra_scripts %}{% endblock %}
  </body>
</html>
