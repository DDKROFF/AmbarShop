{% load static %}
<header class="site-header">
  <div class="container nav-bar">
    <a href="{% url 'home' %}">
      <img class="logo" src="{% static 'images/icons/Logo.svg' %}" alt="Логотип магазина" title="Слово амбар и сельхоз животные" />
    </a>
    
    <!-- Burger Menu for Mobile -->
    <button class="burger-menu" type="button" aria-label="Открыть меню">
      <span></span>
      <span></span>
      <span></span>
    </button>
    
    <nav class="nav-links">
      <a href="{% url 'home' %}">Главная</a>
      <a href="{% url 'shop:catalog' %}">Каталог</a>
      <a href="{% url 'account:cart' %}">Корзина</a>
      <a href="{% url 'guides:guides' %}">Информация</a>
      <a href="{% url 'shop:contacts' %}">Контакты</a>
    </nav>
    
    {% if user.is_authenticated %}
      <div class="auth-group">
        <a href="{% url 'account:profile' %}" class="btn btn-primary">Личный кабинет</a>
      </div>
    {% else %}
      <a href="{% url 'account:login' %}" class="btn btn-primary">Авторизироватся</a>
    {% endif %}
  </div>
  
  <!-- Mobile Search -->
  <div class="mobile-search">
    <form method="get" action="{% url 'shop:catalog' %}" class="mobile-search-form">
      <input type="text" name="q" placeholder="Поиск товаров..." value="{{ request.GET.q }}" />
      <button type="submit" class="btn btn-primary">Поиск</button>
    </form>
  </div>
  
  <!-- Mobile Menu Overlay -->
  <div class="mobile-nav-overlay" id="mobileNavOverlay"></div>
  
  <!-- Mobile Menu -->
  <div class="mobile-nav" id="mobileNav">
    <div class="mobile-nav-header">
      <a href="{% url 'home' %}">
        <img class="mobile-nav-logo" src="{% static 'images/icons/Logo.svg' %}" alt="Амбар" />
      </a>
      <button class="mobile-close-btn" type="button" aria-label="Закрыть меню">&times;</button>
    </div>
    
    <nav class="mobile-nav-links">
      <a href="{% url 'home' %}">Главная</a>
      <a href="{% url 'shop:catalog' %}">Каталог</a>
      <a href="{% url 'account:cart' %}">Корзина</a>
      <a href="{% url 'guides:guides' %}">Информация</a>
      <a href="{% url 'shop:contacts' %}">Контакты</a>
      
      {% if user.is_authenticated %}
        <div class="auth-group">
          <a href="{% url 'account:profile' %}" class="btn btn-primary" style="width: 100%; justify-content: center;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            Личный кабинет
          </a>
          <a href="{% url 'account:logout' %}" class="btn btn-link" style="width: 100%; justify-content: center;">
            Выход
          </a>
        </div>
      {% else %}
        <a href="{% url 'account:login' %}" class="auth-link">Авторизироватся</a>
        <a href="{% url 'account:register' %}" class="btn btn-primary" style="width: 100%; justify-content: center;">
          Регистрация
        </a>
      {% endif %}
    </nav>
  </div>
</header>
